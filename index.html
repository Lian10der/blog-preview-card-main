<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog-preview-card-main</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <card-main class="card-main">
            
            <img class="card-image" src="assets/images/illustration-article.svg" alt="Imagem de preview do card-main">
            <card-tag class="card-tag"><h3>Learning</h3></card-tag>
            <card-date class="card-date">Published 21 Dec 2023</card-date>
            <card-title class="card-title"><h1>HTML & CSS foundations</h1></card-title>
            <card-description class="card-description"><p>These languages are the backbone of every website, defining structure, content, and presentation.</p></card-description>
            <!-- card-profile-picture e card-profile-name em display flex -->
            <card-profile class="card-profile">
                <img src="assets/images/image-avatar.webp" class="card-profile-picture"></card-profile-picture>
                <card-profile-name class="card-profile-name"> Greg Hooper </card-profile-name>
            </card-profile>
    </card-main>
</body>
</html>
